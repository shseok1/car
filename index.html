<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Racing Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Three.js as a global script for local file compatibility -->
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
    <div id="ui-layer">
        <div id="speed-meter">0 km/h</div>
        <div id="gear-display">GEAR: 1</div>
        <div id="rev-bar-container">
            <div id="rev-bar"></div>
        </div>
        <div id="lap-info">
            <div id="current-lap">LAP TIME: 00:00.00</div>
            <div id="best-lap">BEST LAP: --:--.--</div>
            <div id="lap-count">LAPS: 0</div>
        </div>
    </div>

    <div id="start-screen">
        <h1>🏎️ 3D 미래형 레이싱</h1>
        <div class="instructions">
            <h2>게임 조작법</h2>
            <ul>
                <li><strong>W / ↑</strong> : 가속</li>
                <li><strong>S / ↓</strong> : 감속 / 후진</li>
                <li><strong>A / ←</strong> : 좌회전</li>
                <li><strong>D / →</strong> : 우회전</li>
                <li><strong>C</strong> : 시점 전환 (1인칭/3인칭)</li>
            </ul>
            <p>※ 시작 버튼을 누르면 엔진 소리가 활성화됩니다.</p>
        </div>
        <button id="start-button">게임 시작</button>
    </div>

    <!-- Load main script as a regular script (not module) -->
    <script src="src/main.js"></script>
</body>

</html>
