<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Racing Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Three.js as a global script for local file compatibility -->
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
    <div id="ui-layer">
        <div id="speed-meter">0 km/h</div>
        <div id="gear-display">GEAR: 1</div>
        <div id="rev-bar-container">
            <div id="rev-bar"></div>
        </div>
        <div id="lap-info">
            <div id="current-lap">LAP TIME: 00:00.00</div>
            <div id="best-lap">BEST LAP: --:--.--</div>
            <div id="lap-count">LAPS: 0</div>
        </div>
    </div>

    <div id="start-screen">
        <h1>🏎️ 3D 미래형 레이싱</h1>
        <div class="instructions">
            <h2>게임 조작법</h2>
            <ul>
                <li><strong>W / ↑</strong> : 가속</li>
                <li><strong>S / ↓</strong> : 감속 / 후진</li>
                <li><strong>A / ←</strong> : 좌회전</li>
                <li><strong>D / →</strong> : 우회전</li>
                <li><strong>C / ㅊ</strong> : 시점 전환</li>
            </ul>
        </div>
        
        <div id="nickname-container">
            <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요" maxlength="10">
        </div>
        <button id="start-button">게임 시작</button>

        <div id="leaderboard-container">
            <h3>🏆 TOP 5 랭킹</h3>
            <ul id="leaderboard-list">
                <li>기록이 없습니다.</li>
            </ul>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <!-- Load main script as a regular script (not module) -->
    <script src="src/main.js"></script>
</body>

</html>
